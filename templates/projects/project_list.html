{% extends "base.html" %}

{% block content %}
<h1>Projects</h1>

<ul>
    {% for project in projects %}
        <li>
            <a href="{% url 'project_detail' project.id %}">
                {{ project.title }}
            </a>
        </li>
    {% empty %}
        <li>No projects available.</li>
    {% endfor %}
</ul>
{% endblock %}
