{% extends "base.html" %}

{% block content %}
<h1>{{ project.title }}</h1>

<p>{{ project.description }}</p>

<p>
    <a href="{% url 'project_delete' project.pk %}">Delete Project</a> |
    <a href="{% url 'project_list' %}">Back to Projects</a>
</p>

<h2>Tasks</h2>

<ul>
    {% for task in tasks %}
        <li>
            <a href="{% url 'task_detail' task.pk %}">{{ task.title }}</a>
            - {{ task.status }}
        </li>
    {% empty %}
        <li>No tasks in this project.</li>
    {% endfor %}
</ul>
{% endblock %}
