<h1>Dashboard</h1>

<p>
  Pending: {{ pending_count }} |
  In Progress: {{ in_progress_count }} |
  Completed: {{ completed_count }}
</p>

<h2>My Tasks</h2>
<ul>
  {% for task in tasks %}
    <li>{{ task.title }} - {{ task.status }} - due: {{ task.due_date }}</li>
  {% empty %}
    <li>No tasks assigned.</li>
  {% endfor %}
</ul>
