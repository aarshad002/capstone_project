{% extends "base.html" %}

{% block content %}
<h1>
    {% if object %}
        Edit Task
    {% else %}
        Create Task
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

<p>
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>
</p>
{% endblock %}
