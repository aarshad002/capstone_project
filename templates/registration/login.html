{% extends "base.html" %}

{% block content %}
<h1>Login</h1>

{% if form.errors %}
<p style="color:red;">Invalid username or password</p>
{% endif %}

<form method="post" class="main-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
</form>
<p>
Don't have an account?
<a href="{% url 'register' %}">Register</a>
</p>
{% endblock %}
